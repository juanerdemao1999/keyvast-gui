[alias]
gui = "run --bin kv-gui --release"

# Universal network resilience tweaks (safe for every contributor and CI).
#
# NOTE: this file intentionally does NOT pin a crates.io registry mirror.
# A region-specific mirror would route all contributors' crates.io traffic
# through one host. If you need a China-side mirror, see
# `.cargo/config.china-mirror.toml` and opt in via your user cargo config.
[net]
retry = 10
git-fetch-with-cli = true

[http]
timeout = 120
low-speed-limit = 1
